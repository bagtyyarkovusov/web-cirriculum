# Local dev configuration. Local MySQL root has no password (dev-only environment fact).
db.url=jdbc:mysql://localhost:3306/bookstore?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
db.user=root
db.password=

# SM4 symmetric key: 16 bytes encoded as 32 hex chars.
# Provide at runtime via the SM4_KEY environment variable or the sm4.key system property.
# Example: export SM4_KEY=abcdef1234567890abcdef1234567890
sm4.key=${SM4_KEY}
